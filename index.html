<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <meta name="theme-color" content="#1abc9c">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="RMZ Tools">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <title>RMZ TEAM - টুলস হাব</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: #f0f2f5;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #1abc9c, #16a085);
            padding: 20px;
            text-align: center;
        }
        .header h1 {
            margin: 0;
            color: white;
            font-size: 28px;
        }
        .header p {
            margin: 8px 0 0;
            color: rgba(255,255,255,0.9);
            font-size: 14px;
        }
        .tabs {
            display: flex;
            flex-wrap: wrap;
            background: #2c3e50;
            gap: 2px;
        }
        .tab-btn {
            flex: 1;
            background: #34495e;
            border: none;
            padding: 15px 10px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        .tab-btn:hover {
            background: #1abc9c;
        }
        .tab-btn.active {
            background: #1abc9c;
            color: #000;
        }
        .tab-content {
            display: none;
            padding: 20px;
            border-top: 3px solid #1abc9c;
            animation: fadeIn 0.3s ease;
        }
        .tab-content.active {
            display: block;
        }
        iframe {
            width: 100%;
            min-height: 80vh;
            border: none;
            border-radius: 12px;
            background: white;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px);}
            to { opacity: 1; transform: translateY(0);}
        }
        .info-note {
            background: #e8f4f8;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 14px;
            color: #2c3e50;
        }
        .telegram-float {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
        }
        .telegram-btn {
            background: #0088cc;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
            animation: pulse 2s infinite;
        }
        .telegram-btn:hover {
            transform: scale(1.1);
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(0,136,204,0.7); }
            70% { box-shadow: 0 0 0 15px rgba(0,136,204,0); }
            100% { box-shadow: 0 0 0 0 rgba(0,136,204,0); }
        }
        @media (max-width: 600px) {
            .tab-btn { font-size: 12px; padding: 10px 5px; }
            iframe { min-height: 70vh; }
            .telegram-btn { width: 50px; height: 50px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🚀 RMZ TEAM</h1>
        <p>Your Trusted Tool Hub</p>
    </div>
    
    <div class="tabs">
        <button class="tab-btn active" data-tab="tab1">🔢 ২এফএ জেনারেটর</button>
        <button class="tab-btn" data-tab="tab2">🍪 কুকি টু ইউআইডি</button>
        <button class="tab-btn" data-tab="tab3">🔐 ফেইসবুক আইডি রিলিজ</button>
    </div>

    <div id="tab1" class="tab-content active">
        <div class="info-note">
            📌 ২-ফ্যাক্টর অথেনটিকেশন কোড জেনারেটর। কোড কপি করতে উপরে চাপ দিন।
        </div>
        <iframe src="https://abdulkhalekak.github.io/My2fa-gen/" title="2FA Generator"></iframe>
    </div>

    <div id="tab2" class="tab-content">
        <div class="info-note">
            📌 একাধিক কুকি পেস্ট করে ইউজার আইডি বের করুন।
        </div>
        <iframe src="https://abdulkhalekak.github.io/Cookies-to-uid/" title="Cookie to UID"></iframe>
    </div>

    <div id="tab3" class="tab-content">
        <div class="info-note">
            📌 ফেইসবুক আইডি রিলিজ টুল।
        </div>
        <iframe src="https://abdulkhalekak.github.io/Fb-id-relece-/" title="FB ID Release"></iframe>
    </div>
</div>

<div class="telegram-float">
    <a href="https://t.me/realmoneyincomezone" target="_blank" style="text-decoration:none;">
        <div class="telegram-btn">
            <svg width="35" height="35" viewBox="0 0 24 24" fill="white">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8c-.15 1.58-.8 5.42-1.13 7.19-.14.75-.42 1-.68 1.03-.58.05-1.02-.38-1.58-.75-.88-.58-1.38-.94-2.23-1.5-.99-.66-.35-1.02.22-1.62.15-.15 2.71-2.48 2.76-2.69.01-.03.01-.14-.07-.2-.08-.06-.19-.04-.27-.02-.12.03-1.98 1.26-5.59 3.7-.53.36-1.01.54-1.44.53-.47-.01-1.38-.27-2.05-.49-.83-.27-1.48-.42-1.42-.89.03-.24.36-.49.99-.74 3.91-1.7 6.52-2.82 7.84-3.38 3.73-1.59 4.51-1.86 5.01-1.87.11 0 .36.03.52.19.13.13.17.31.18.48-.01.13-.01.21-.02.25z"/>
            </svg>
        </div>
    </a>
</div>

<script>
    const tabs = document.querySelectorAll('.tab-btn');
    const contents = document.querySelectorAll('.tab-content');
    tabs.forEach(btn => {
        btn.addEventListener('click', () => {
            const tabId = btn.getAttribute('data-tab');
            tabs.forEach(b => b.classList.remove('active'));
            contents.forEach(c => c.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById(tabId).classList.add('active');
        });
    });
</script>
</body>
</html>
