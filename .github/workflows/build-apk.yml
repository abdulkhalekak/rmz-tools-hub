name: Build and Release APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Release তৈরি করার অনুমতি
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Install Cordova
        run: npm install -g cordova
      
      - name: Build APK
        run: |
          cordova create app com.rmzteam.toolshub "RMZ Tools Hub"
          cd app
          cordova platform add android
          rm -rf www/*
          cp ../index.html www/index.html
          cordova build android --release
          
          # Sign
          cd platforms/android/app/build/outputs/apk/release/
          keytool -genkey -v -keystore debug.keystore -alias debug -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android -dname "CN=RMZ, OU=ID, O=RMZ, L=Dhaka, ST=Dhaka, C=BD" 2>/dev/null
          jarsigner -verbose -keystore debug.keystore -storepass android -keypass android app-release-unsigned.apk debug
          cp app-release-unsigned.apk /home/runner/work/rmz-tools-hub/rmz-tools-hub/RMZ-Tools-Hub.apk
      
      - name: Create Release and Upload APK
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "RMZ Tools Hub v1.0.${{ github.run_number }}"
          files: RMZ-Tools-Hub.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
