name: Build and Release APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Install Cordova
        run: npm install -g cordova
      
      - name: Build Debug APK (সরাসরি ইন্সটলযোগ্য)
        run: |
          # Cordova প্রজেক্ট তৈরি
          cordova create app com.rmzteam.toolshub "RMZ Tools Hub"
          cd app
          cordova platform add android
          
          # HTML ফাইল কপি
          rm -rf www/*
          cp ../index.html www/index.html
          
          # Debug বিল্ড (ইতিমধ্যেই সাইন করা থাকে)
          cordova build android --debug
          
          # Debug APK কপি
          cp platforms/android/app/build/outputs/apk/debug/app-debug.apk /home/runner/work/rmz-tools-hub/rmz-tools-hub/RMZ-Tools-Hub.apk
          
          # সাইজ চেক
          ls -la /home/runner/work/rmz-tools-hub/rmz-tools-hub/RMZ-Tools-Hub.apk
      
      - name: Create Release and Upload APK
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "RMZ Tools Hub v1.0.${{ github.run_number }}"
          files: RMZ-Tools-Hub.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
